name: Build & Release Daily Video Papers APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        default: 'v1.0.0'

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Get Flutter packages
        run: |
          cd mobile_app
          flutter pub get

      - name: Build APK
        run: |
          cd mobile_app
          flutter build apk --release \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number="${{ github.run_number }}"

      - name: Rename and stage APK
        run: |
          mkdir -p output
          cp mobile_app/build/app/outputs/flutter-apk/app-release.apk \
            output/daily-video-papers-v1.0.${{ github.run_number }}.apk
          echo "APK size: $(du -sh output/*.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-video-papers-apk
          path: output/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Daily Video Papers ${{ github.event.inputs.release_tag || github.ref_name }}
          body: |
            ## 📱 Daily Video Papers Android App

            每日浏览 arXiv 视频方向最新论文的 Android 阅读器。

            ### 下载安装
            - 下载 `daily-video-papers-*.apk` 安装到 Android 手机（Android 7.0+）
            - 首次安装需开启"允许安装未知来源应用"

            ### 功能
            - 📄 按日期浏览每日论文列表
            - 🔗 直接跳转 arXiv 论文页面
            - 🌍 World Model Papers 专区
            - 🤖 Agent Papers 专区

            Build #${{ github.run_number }} | Commit: ${{ github.sha }}
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
