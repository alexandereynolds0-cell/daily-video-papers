name: Build & Release Daily Video Papers APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        default: 'v1.0.0'

jobs:
  build-apk:
    name: Build React Native APK (OpenClawPapers)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java & Android SDK ─────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: OpenClawPapers/package-lock.json

      # ── Install JS dependencies ─────────────────────────────────────────────
      - name: Install JS dependencies
        working-directory: OpenClawPapers
        run: npm ci

      # ── Grant execute permissions to gradlew ────────────────────────────────
      - name: Fix gradlew permissions
        working-directory: OpenClawPapers/android
        run: chmod +x gradlew

      # ── Build release APK ───────────────────────────────────────────────────
      # Uses the debug keystore that ships with the repo (OpenClawPapers/android/app/debug.keystore)
      # so the APK is signed and can be installed without Play Store.
      - name: Build APK (React Native)
        working-directory: OpenClawPapers/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── Stage APK ───────────────────────────────────────────────────────────
      - name: Stage APK for release
        run: |
          mkdir -p output
          APK=$(find OpenClawPapers/android -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" "output/daily-video-papers-v1.0.${{ github.run_number }}.apk"
          echo "APK size: $(du -sh output/*.apk | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-video-papers-apk
          path: output/*.apk
          retention-days: 30

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Daily Video Papers ${{ github.event.inputs.release_tag || github.ref_name }}
          body: |
            ## 📱 Daily Video Papers Android App

            每日浏览 arXiv 视频方向最新论文的 Android 阅读器。

            ### 下载安装
            - 下载 `daily-video-papers-*.apk` 安装到 Android 手机（Android 7.0+）
            - 首次安装需开启「允许安装未知来源应用」

            ### 功能
            - 📄 按日期浏览每日论文列表
            - 🔗 直接跳转 arXiv 论文页面
            - 🌍 World Model Papers / Agent Papers 分类浏览

            Build #${{ github.run_number }} | Commit: ${{ github.sha }}
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
