name: Build & Release Daily Video Papers APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

env:
  VERSION_CODE: ${{ github.run_number }}
  VERSION_NAME: 1.0.${{ github.run_number }}
  RELEASE_TAG: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name || format('auto-v1.0.{0}', github.run_number)) }}

jobs:
  build-apk:
    name: Build React Native APK (OpenClawPapers)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: OpenClawPapers/package-lock.json

      - name: Install JS dependencies
        working-directory: OpenClawPapers
        run: npm ci

      - name: Fix gradlew permissions
        working-directory: OpenClawPapers/android
        run: chmod +x gradlew

      - name: Build APK (React Native)
        working-directory: OpenClawPapers/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
          VERSION_NAME: ${{ env.VERSION_NAME }}

      - name: Stage APKs for release
        run: |
          mkdir -p output
          APK="OpenClawPapers/android/app/build/outputs/apk/release/app-release.apk"
          test -f "$APK"
          cp "$APK" "output/PaperHub-v${VERSION_NAME}.apk"
          cp "$APK" "output/PaperHub-latest.apk"
          du -sh output/*.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-video-papers-apk
          path: output/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: PaperHub ${{ env.VERSION_NAME }}
          body: |
            ## 📱 PaperHub Android App

            自动构建版本：${{ env.VERSION_NAME }}
            版本号（versionCode）：${{ env.VERSION_CODE }}

            ### 下载安装
            - 下载 `PaperHub-latest.apk` 安装到 Android 手机
            - App 内更新按钮也会指向这个最新 APK

            Build #${{ github.run_number }} | Commit: ${{ github.sha }}
          files: output/*.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
